kind = "web"
previewPath = "/"
title = "Krynn Tools"
version = "1.0.0"
id = "artifacts/krynn-tools"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22209

[services.development]
run = "pnpm --filter @workspace/krynn-tools run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/krynn-tools", "run", "build" ]
serve = "static"
publicDir = "artifacts/krynn-tools/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22209"
BASE_PATH = "/"
