name: Trending News Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and process RSS feeds
        id: fetch
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt of 3..."
            node scripts/fetch-trending-news.mjs && break
            echo "Fetch failed on attempt $attempt"
            if [ "$attempt" -eq 3 ]; then
              echo "All fetch attempts failed"
              exit 1
            fi
            sleep 10
          done
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Generate news sitemap
        id: sitemap
        run: |
          npx tsx scripts/generate-news-sitemap.ts || {
            echo "News sitemap generation failed"
            exit 1
          }

      - name: Generate news RSS
        id: rss
        run: |
          npx tsx scripts/generate-news-rss.ts || {
            echo "News RSS generation failed"
            exit 1
          }

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/trending-news/
          git diff --cached --quiet || git commit -m "news: update trending news data, sitemap, and RSS [skip ci]"
          git push
